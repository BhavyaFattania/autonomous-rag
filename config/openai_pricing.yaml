# USD per million tokens: [input, output].
# Source: https://openai.com/api/pricing/ — OpenAI's API does not expose pricing
# programmatically (GET /v1/models returns ids only, no price fields), so this
# must be updated by hand when OpenAI changes prices. Update this file directly;
# no code changes are needed. A model missing from this list logs a warning and
# is costed at $0 rather than failing the run.
models:
  gpt-4o: [2.50, 10.00]
  gpt-4o-mini: [0.15, 0.60]
  gpt-4.1: [2.00, 8.00]
  gpt-4.1-mini: [0.40, 1.60]
  gpt-4.1-nano: [0.10, 0.40]
  o3-mini: [1.10, 4.40]
